resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      '';
}

upstream apparel_store_backend {
  zone apparel_store_backend 64k;
  server apparel-store-backend:8080 resolve;
  keepalive 32;
}

upstream apparel_store_frontend_dev {
  zone apparel_store_frontend_dev 64k;
  server apparel-store-frontend-dev:3000 resolve;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name dev.apparel-store.com;
  return 308 https://$host$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name dev.apparel-store.com;

  ssl_certificate /etc/nginx/ssl/dev.apparel-store.com.crt;
  ssl_certificate_key /etc/nginx/ssl/dev.apparel-store.com.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok\n';
  }

  location ^~ /api/ {
    client_max_body_size 128m;
    proxy_pass http://apparel_store_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  location / {
    proxy_pass http://apparel_store_frontend_dev;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_connect_timeout 5s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
