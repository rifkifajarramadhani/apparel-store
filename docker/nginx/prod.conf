resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      '';
}

upstream apparel_store_backend {
  zone apparel_store_backend 64k;
  server apparel-store-backend:8080 resolve;
  keepalive 32;
}

upstream apparel_store_frontend_prod {
  zone apparel_store_frontend_prod 64k;
  server apparel-store-frontend-prod:3000 resolve;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name apparel-store.rifkiramadhani.my.id www.apparel-store.rifkiramadhani.my.id;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type text/plain;
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok\n';
  }

  location / {
    return 308 https://apparel-store.rifkiramadhani.my.id$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name www.apparel-store.rifkiramadhani.my.id;

  ssl_certificate /etc/letsencrypt/live/apparel-store.rifkiramadhani.my.id/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/apparel-store.rifkiramadhani.my.id/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  return 308 https://apparel-store.rifkiramadhani.my.id$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name apparel-store.rifkiramadhani.my.id;

  ssl_certificate /etc/letsencrypt/live/apparel-store.rifkiramadhani.my.id/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/apparel-store.rifkiramadhani.my.id/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok\n';
  }

  location ^~ /api/ {
    client_max_body_size 128m;
    proxy_pass http://apparel_store_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  location / {
    proxy_pass http://apparel_store_frontend_prod;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_connect_timeout 5s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
