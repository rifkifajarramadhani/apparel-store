services:
  web-dev:
    profiles: [dev]
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=/api
      - SERVER_API_URL=http://apparel-store-backend:8080/api
    volumes:
      - .:/app
      - /app/node_modules # keep container-installed deps over the bind mount
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/').then(() => {}).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 2s
      start_period: 10s
      retries: 30
    networks:
      shared:
        aliases:
          - apparel-store-frontend-dev

  gateway-dev:
    profiles: [dev]
    image: nginx:1.27-alpine
    init: true
    depends_on:
      web-dev:
        condition: service_healthy
    ports:
      - '${DEV_GATEWAY_HTTP_PORT:-80}:80'
      - '${DEV_GATEWAY_HTTPS_PORT:-443}:443'
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl/dev.apparel-store.com.crt:/etc/nginx/ssl/dev.apparel-store.com.crt:ro
      - ./docker/nginx/ssl/dev.apparel-store.com.key:/etc/nginx/ssl/dev.apparel-store.com.key:ro
    networks:
      - shared
    restart: unless-stopped

  web-prod:
    profiles: [prod]
    build:
      context: .
      target: prod
      args:
        VITE_API_URL: /api
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - SERVER_API_URL=http://apparel-store-backend:8080/api
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/').then(() => {}).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 20
    networks:
      shared:
        aliases:
          - apparel-store-frontend-prod
    restart: unless-stopped

  gateway-prod:
    profiles: [prod]
    image: nginx:1.27-alpine
    init: true
    depends_on:
      web-prod:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    command: >-
      /bin/sh -c '(while sleep 6h; do nginx -s reload; done) &
      exec nginx -g "daemon off;"'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - shared
    restart: unless-stopped

  certbot-bootstrap:
    profiles: [certbot]
    image: certbot/certbot:v4.0.0
    ports:
      - "80:80"
    volumes:
      - certbot-certs:/etc/letsencrypt
    command:
      - certonly
      - --standalone
      - --non-interactive
      - --agree-tos
      - --email
      - ${CERTBOT_EMAIL:?CERTBOT_EMAIL must be set}
      - --domain
      - apparel-store.rifkiramadhani.my.id
      - --domain
      - www.apparel-store.rifkiramadhani.my.id

  certbot-renew:
    profiles: [prod]
    image: certbot/certbot:v4.0.0
    depends_on:
      gateway-prod:
        condition: service_healthy
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh
    command: >-
      -c 'trap exit TERM; while :; do
      certbot renew --webroot --webroot-path /var/www/certbot;
      sleep 12h & wait $$!;
      done'
    restart: unless-stopped

networks:
  shared:
    name: apparel-store-shared
    external: true

volumes:
  certbot-certs:
  certbot-webroot:
