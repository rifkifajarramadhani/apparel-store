services:
  web-dev:
    profiles: [dev]
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=/api
      - SERVER_API_URL=http://apparel-store-backend:8080/api
    volumes:
      - .:/app
      - /app/node_modules # keep container-installed deps over the bind mount
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/').then(() => {}).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 2s
      start_period: 10s
      retries: 30
    networks:
      shared:
        aliases:
          - apparel-store-frontend-dev

  gateway-dev:
    profiles: [dev]
    image: nginx:1.27-alpine
    init: true
    depends_on:
      web-dev:
        condition: service_healthy
    ports:
      - '${DEV_GATEWAY_HTTP_PORT:-80}:80'
      - '${DEV_GATEWAY_HTTPS_PORT:-443}:443'
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl/dev.apparel-store.com.crt:/etc/nginx/ssl/dev.apparel-store.com.crt:ro
      - ./docker/nginx/ssl/dev.apparel-store.com.key:/etc/nginx/ssl/dev.apparel-store.com.key:ro
    networks:
      - shared
    restart: unless-stopped

  web-prod:
    profiles: [prod]
    build:
      context: .
      target: prod
      args:
        VITE_API_URL: /api
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - SERVER_API_URL=http://apparel-store-backend:8080/api
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/').then(() => {}).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 20
    networks:
      # Internal network to reach the backend for SSR (SERVER_API_URL)
      shared:
        aliases:
          - apparel-store-frontend-prod
      # Public edge network: Traefik routes external traffic to this container
      edge: {}
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      # Everything for these hosts that isn't /api is served by the frontend
      - "traefik.http.routers.apparel-web.rule=Host(`apparel-store.rifkiramadhani.my.id`) || Host(`www.apparel-store.rifkiramadhani.my.id`)"
      - traefik.http.routers.apparel-web.entrypoints=websecure
      - traefik.http.routers.apparel-web.tls=true
      - traefik.http.routers.apparel-web.tls.certresolver=letsencrypt
      - traefik.http.services.apparel-web.loadbalancer.server.port=3000
      # Redirect www -> apex (preserves prior nginx behavior)
      - traefik.http.routers.apparel-web.middlewares=apparel-www-redirect
      - "traefik.http.middlewares.apparel-www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.apparel-www-redirect.redirectregex.replacement=https://$${1}"
      - traefik.http.middlewares.apparel-www-redirect.redirectregex.permanent=true
    restart: unless-stopped

networks:
  shared:
    name: apparel-store-shared
    external: true
  edge:
    name: edge
    external: true
